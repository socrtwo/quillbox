name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Builds an UNSIGNED release APK. No keystore is configured in CI, so the
      # release signingConfig stays unset and Gradle emits app-release-unsigned.apk.
      # Download this artifact and sign it yourself (e.g. with apksigner in Termux).
      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-release-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
