name: Android CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Needed so the release step can create a GitHub Release on version tags.
permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Decode the signing keystore from a repository secret, if one is configured.
      # When the KEYSTORE_BASE64 secret is absent this is a no-op and the release
      # build stays unsigned (Gradle emits app-release-unsigned.apk). Once the
      # signing secrets are set, the release APK comes out pre-signed automatically.
      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Keystore configured -> release APK will be SIGNED."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret -> release APK will be UNSIGNED."
          fi

      - name: Build release APK
        env:
          # app/build.gradle.kts reads these; blank values mean "no signing config".
          QUILLBOX_RELEASE_STORE_FILE: ${{ steps.keystore.outputs.configured == 'true' && format('{0}/release.jks', runner.temp) || '' }}
          QUILLBOX_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          QUILLBOX_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          QUILLBOX_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Captures whichever the build produced: app-release.apk (signed) or
      # app-release-unsigned.apk (when no keystore secret is configured).
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # Rename the release APK to include the tag so the download has a clear name.
      - name: Stage release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-assets
          SRC=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$SRC" "release-assets/quillbox-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "release-assets/quillbox-${GITHUB_REF_NAME}-debug.apk"

      # Publishes a numbered GitHub Release (shown in the repo's Releases section)
      # whenever a tag like v1.0.0 is pushed, attaching the built APKs.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Quillbox ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*.apk
