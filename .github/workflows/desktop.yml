name: Desktop CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            installer: deb
          - os: windows-latest
            installer: msi
          - os: macos-latest
            installer: dmg
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils
        working-directory: .

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Always produces a runnable app image; this is the real compile/build check.
      - name: Build runnable app image
        run: ./gradlew createDistributable --stacktrace

      - name: Upload app image
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-desktop-${{ matrix.os }}-app
          path: desktop/build/compose/binaries/main/app
          if-no-files-found: error

      # Native installer (.deb/.msi/.dmg). Best-effort: needs OS packaging tooling
      # (WiX on Windows, fakeroot on Linux) that may not be present on every runner.
      - name: Build native installer
        continue-on-error: true
        run: ./gradlew packageDistributionForCurrentOS --stacktrace

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-desktop-${{ matrix.installer }}
          path: desktop/build/compose/binaries/main/${{ matrix.installer }}/*
          if-no-files-found: ignore
