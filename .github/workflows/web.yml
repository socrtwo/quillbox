name: Web CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build web backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Compiles the Ktor backend and produces a runnable server distribution.
      - name: Build distribution
        run: ./gradlew build distZip --stacktrace

      - name: Upload server distribution
        uses: actions/upload-artifact@v4
        with:
          name: quillbox-web-server
          path: web/build/distributions/*.zip
          if-no-files-found: error
